# most of the file comes from this tutorial
# https://docs.docker.com/guides/reactjs/configure-github-actions/#step-2-set-up-the-workflow
name: "Build & push to Dockerhub"

# occurs when a PR is merged on main and file `version` is modified
on:
  push:
    branches:
      - main
    paths:
      - version 

jobs:
  build_push:
    name: "Push to Dockerhub"
    runs-on: ubuntu-22.04
    steps:
      # 1. Checkout source code
      - name: Checkout source code
        uses: actions/checkout@v6
    
      # 2. Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # 3. Cache Docker layers
      - name: Cache Docker layers
        uses: actions/cache@v5
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: ${{ runner.os }}-buildx-

      # 5. Extract metadata
      - name: Extract metadata
        id: meta
        run: |
          echo "REPO_NAME=${GITHUB_REPOSITORY##*/}" >> "$GITHUB_OUTPUT"
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          
      # 8. Login to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 9. Build and push prod image
      - name: Build and push production image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKERHUB_DOCS_PROJECT_NAME }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKERHUB_DOCS_PROJECT_NAME }}:$(cat version)
            ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKERHUB_DOCS_PROJECT_NAME }}:${{ steps.meta.outputs.SHORT_SHA }}
          cache-from: type=local,src=/tmp/.buildx-cache
    
      
